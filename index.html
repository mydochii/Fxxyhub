left:0;

align-items:center;

}

cursor:pointer;
}

.pagination{

padding:20px;
}

button{
padding:10px 20px;

margin:5px;
cursor:pointer;
}

let page=1;
const perPage=8;

function renderVideos(){

const grid=document.getElementById("grid");
grid.innerHTML="";

let start=(page-1)*perPage;
let end=start+perPage;

videoList.slice(start,end).forEach(v=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<video src="${v[0]}" muted preload="metadata"></video>
<div class="title">${v[1]}</div>
`;

card.onclick=()=>{

const video=document.getElementById("mainVideo");

video.src=v[0];

document.getElementById("player").style.display="flex";

openAd();

video.dataset.adShown=false;

video.ontimeupdate=function(){

if(video.currentTime>20 && video.dataset.adShown=="false"){

video.dataset.adShown=true;

openAd();

}

};

};

grid.appendChild(card);

});

}

function nextPage(){

if(page*perPage<videoList.length){

page++;

openAd();

renderVideos();

}

}

function prevPage(){

if(page>1){

page--;

openAd();

renderVideos();

}

}

function closePlayer(){

document.getElementById("player").style.display="none";

document.getElementById("mainVideo").pause();

}

renderVideos();
