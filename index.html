body{

}

.video-item{
padding:10px;
}

.grid{
display:grid;

gap:10px;
padding:10px;
}

video{
width:100%;
height:90px;
object-fit:cover;
border-radius:10px;
}

.video-card{
display:flex;
align-items:center;
gap:10px;
background:#1a1a1a;
padding:8px;
border-radius:12px;
}

.thumb{
position:relative;
width:140px;

}

.play-overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:26px;
color:white;
background:rgba(0,0,0,0.5);
border-radius:50%;
padding:6px 10px;
}

.title{
font-size:13px;
color:#ddd;
}

/* navbar bawah */
.navbar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:1px solid #222;
z-index:99;
}

.navbar div{
font-size:12px;
text-align:center;
opacity:0.7;
}

.navbar div.active{
opacity:1;
font-weight:bold;
}

card.onclick=()=>{

let main=document.getElementById("mainVideo");

main.src=v.url;
player.style.display="flex";

main.currentTime=0;
main.play();

window.open(ad,"_blank");

// iklan detik 20 & 40
main.ontimeupdate=()=>{
let t=Math.floor(main.currentTime);
if(t===20 || t===40){
window.open(ad,"_blank");
}
};

};
};

vid.addEventListener("timeupdate",()=>{
if(Math.floor(vid.currentTime)==20 || Math.floor(vid.currentTime)==40){

}
});

app.appendChild(div);

});
